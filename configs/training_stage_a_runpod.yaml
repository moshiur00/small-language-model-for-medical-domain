train_directory: datasets/tokenized/stage_a/train
validation_directory: datasets/tokenized/evaluation/validation
tokenizer_json: artifacts/tokenizer/tokenizer.json
output_directory: /workspace/stage_a
checkpoint_backup_directory: null
seed: 42
device: auto
precision: auto
micro_batch_size: 16
gradient_accumulation_steps: 8
evaluation_batch_size: 32
dataloader_workers: 4
pin_memory: true
learning_rate: 3.0e-4
final_learning_rate: 3.0e-5
warmup_updates: 73
