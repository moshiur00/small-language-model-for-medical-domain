max_updates: 7310
max_epochs: 1
adam_beta1: 0.9
adam_beta2: 0.95
weight_decay: 0.1
max_gradient_norm: 1.0
log_interval: 10
validation_interval: 250
checkpoint_interval: 250
keep_recent_checkpoints: 2
milestone_interval: 1000
