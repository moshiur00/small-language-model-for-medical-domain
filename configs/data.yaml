corpus_assembly:
  output_directory: datasets/processed
  input_stage: toxicity_audited

  # Include documents marked for review by quality or license stages.
  # Supported values: include, exclude
  review_policy: include

  # Require metadata produced by previous stages.
  require_quality_metadata: true
  require_license_metadata: true

  # Only these upstream decisions can enter the final corpus.
  accepted_quality_decisions:
    - pass
    - review

  accepted_license_decisions:
    - pass
    - review

  # Development limit applied separately to every input file.
  # Use null for the complete corpus.
  max_documents_per_input: null

  # Tokenizer corpus is created only from the training split.
  tokenizer_split: train
  tokenizer_corpus_filename: tokenizer_corpus.txt

  # Convert internal line breaks to spaces so every document occupies
  # exactly one line in tokenizer_corpus.txt.
  flatten_tokenizer_documents: true

  # Do not insert <eos> here because the tokenizer has not been trained yet.
  tokenizer_document_separator: "\n"

  # Approximate token count before the tokenizer exists.
  estimated_characters_per_token: 4.0

  store_assembly_metadata: true

  inputs:
    - dataset: wikitext103
      source_split: test
      output_split: test
      input_path: datasets/interim/toxicity_audited/wikitext103/test.jsonl

    - dataset: wikitext103
      source_split: validation
      output_split: validation
      input_path: datasets/interim/toxicity_audited/wikitext103/validation.jsonl

    - dataset: tinystories
      source_split: validation
      output_split: validation
      input_path: datasets/interim/toxicity_audited/tinystories/validation.jsonl

    - dataset: wikipedia
      source_split: train
      output_split: train
      input_path: datasets/interim/toxicity_audited/wikipedia/train.jsonl

    - dataset: wikitext103
      source_split: train
      output_split: train
      input_path: datasets/interim/toxicity_audited/wikitext103/train.jsonl

    - dataset: tinystories
      source_split: train
      output_split: train
      input_path: datasets/interim/toxicity_audited/tinystories/train.jsonl

tokenizer:
  training_corpus: datasets/processed/corpora/tokenizer_60m/corpus.txt
  output_directory: artifacts/tokenizer

  algorithm: byte_level_bpe
  vocabulary_size: 16000
  minimum_frequency: 2

  unicode_normalization: NFKC
  add_prefix_space: false
  trim_offsets: true
  add_bos_and_eos: true
  model_max_length: 1024
  save_model_files: true
  show_progress: true

  special_tokens:
    pad_token: "<pad>"
    unknown_token: "<unk>"
    beginning_of_sequence_token: "<bos>"
    end_of_sequence_token: "<eos>"

  evaluation:
    output_path: artifacts/tokenizer/tokenizer_metrics.json
    inputs:
      - name: train
        path: datasets/processed/train.jsonl
        max_documents: 1000
      - name: validation
        path: datasets/processed/validation.jsonl
        max_documents: 1000
      - name: test
        path: datasets/processed/test.jsonl
        max_documents: 1000
    store_sample_encodings: true
    maximum_sample_encodings: 20
    medical_terms:
      - cardiomyopathy
      - electroencephalography
      - gastroenterology
      - immunohistochemistry
      - pharmacokinetics
      - neurotransmitter
      - cardiovascular
      - schizophrenia
      - acetylcholine
      - adenocarcinoma

  comparison:
    custom_tokenizer_path: artifacts/tokenizer
    gpt2_tokenizer_name: openai-community/gpt2

    evaluation_files:
      - datasets/processed/validation.jsonl
      - datasets/processed/test.jsonl

    text_field: text
    max_documents: null
    sample_count: 5

    output_directory: artifacts/tokenizer/comparison

    medical_terms:
      - cardiovascular
      - electrocardiography
      - gastroenterology
      - neurodegenerative
      - immunohistochemistry
      - pharmacokinetics
      - contraindication
      - hypertension
      - hypoglycemia
      - adenocarcinoma
      - echocardiography
      - cerebrovascular
      - thrombocytopenia
      - bronchodilator
      - metastasis
      - inflammation
      - antimicrobial
      - intravenous
      - diagnosis
      - prognosis

tokenized_dataset_defaults:
  tokenizer_path: artifacts/tokenizer

  # Each stored sample contains sequence_length + 1 tokens.
  # Dataset returns 256 input tokens and their 256 next-token labels.
  sequence_length: 256

  # 8192 sequences × 257 tokens × 2 bytes ≈ 4.0 MiB per uint16 shard.
  sequences_per_shard: 8192

  # auto selects uint16 for your 16,000-token vocabulary.
  dtype: auto
  text_field: text

  # Refuse accidental replacement unless this is true or --overwrite is used.
  overwrite: false

  # Optional development limit applied to all splits.
  max_documents: null

tokenized_datasets:
  stage_a:
    output_directory: datasets/tokenized/stage_a
    splits:
      train:
        input_path: datasets/processed/corpora/stage_a_325m/train.jsonl

