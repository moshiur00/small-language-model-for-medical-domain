project:
  random_seed: 42
  corpora_config: configs/corpora.yaml

datasets:
  fineweb_edu:
    source_type: huggingface
    hub_name: HuggingFaceFW/fineweb-edu
    revision: 87f09149ef4734204d70ed1d046ddc9ca3f2b8f9
    config_name: sample-10BT
    source_name: fineweb_edu
    license: odc-by-1.0
    language: en
    streaming: true
    splits: { train: train }
    max_documents: { train: 181250 }
    output_directory: datasets/raw/fineweb_edu

  project_gutenberg_public_domain:
    source_type: huggingface
    hub_name: common-pile/project_gutenberg
    revision: 01dc90a5002f8977c7fb03a372c14bca29c65cf1
    config_name: null
    source_name: project_gutenberg_public_domain
    license: public-domain-review
    language: en
    streaming: true
    splits: { train: train }
    max_documents: { train: 500 }
    output_directory: datasets/raw/project_gutenberg_public_domain

  medmcqa:
    source_type: huggingface
    hub_name: openlifescienceai/medmcqa
    revision: 91c6572c454088bf71b679ad90aa8dffcd0d5868
    config_name: null
    source_name: medmcqa
    license: apache-2.0
    language: en
    streaming: true
    splits: { train: train, validation: validation, test: test }
    max_documents: { train: 182822, validation: 4183, test: 6150 }
    output_directory: datasets/raw/medmcqa

  pubmed_abstracts:
    source_type: ncbi_eutils
    base_url: https://eutils.ncbi.nlm.nih.gov/entrez/eutils
    database: pubmed
    search_term: "hasabstract[text] AND english[lang]"
    # PubMed ESearch exposes at most 9,999 records per query. The downloader
    # walks backward through disjoint record-creation-date windows inside this
    # pinned range until max_documents is reached. CRDT avoids large first-of-
    # month spikes caused by incomplete bibliographic publication dates.
    date_field: CRDT
    date_start: "2025/01/01"
    date_end: "2026/07/18"
    batch_size: 200
    email_environment_variable: NCBI_EMAIL
    api_key_environment_variable: NCBI_API_KEY
    source_name: pubmed_abstracts
    license: pubmed-terms-record-level-copyright
    language: en
    streaming: true
    resume: true
    splits: { train: all }
    max_documents: { train: 325000 }
    output_directory: datasets/raw/pubmed_abstracts

  pmc_open_access:
    source_type: ncbi_eutils
    base_url: https://eutils.ncbi.nlm.nih.gov/entrez/eutils
    database: pmc
    search_term: "open access[filter] AND english[lang]"
    # PMC history sessions can expire during a 50k-record fetch. Short EDAT
    # partitions keep each history session bounded and independently retryable.
    date_field: EDAT
    date_start: "2025/01/01"
    date_end: "2026/07/18"
    batch_size: 100
    email_environment_variable: NCBI_EMAIL
    api_key_environment_variable: NCBI_API_KEY
    source_name: pmc_open_access
    license: article-level
    language: en
    streaming: true
    resume: true
    splits: { train: all }
    max_documents: { train: 50000 }
    output_directory: datasets/raw/pmc_open_access

  wikidoc:
